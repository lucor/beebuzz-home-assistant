[tools]
python = "3.13"
uv = "0.11.10"
# `age` from the aqua registry installs both the `age` and `age-keygen`
# binaries we use for the interop tests in tests/components/beebuzz/test_age.py.
age = "1.3.1"

[tasks.test]
description = "Run the full Python test suite"
run = "uv run --no-project --python 3.13 --with-requirements requirements_test.txt pytest"

[tasks.test-age]
description = "Run the age encryption tests"
run = "uv run --no-project --python 3.13 --with-requirements requirements_test.txt pytest tests/components/beebuzz/test_age.py"

[tasks.lint]
description = "Run Python lint checks"
run = "uv run --no-project --python 3.13 --with ruff ruff check custom_components tests"
